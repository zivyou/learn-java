version: '3'
services:
  mosquitto:
    image: "docker.m.daocloud.io/eclipse-mosquitto"
    ports:
      - "1883:1883"
    container_name: mosquitto-server
    networks:
      - app-network

  service1:
    ports:
      - "8081:8081"
    image: "learn-paxos:latest"
    depends_on:
      - mosquitto
    networks:
      - app-network
    environment:
      mqtt.broker: tcp://mosquitto:1883
  service2:
    ports:
      - "8082:8081"
    image: "learn-paxos:latest"
    depends_on:
      - mosquitto
    networks:
      - app-network
    environment:
      mqtt.broker: tcp://mosquitto:1883
  service3:
    ports:
      - "8083:8081"
    image: "learn-paxos:latest"
    depends_on:
      - mosquitto
    networks:
      - app-network
    environment:
      mqtt.broker: tcp://mosquitto:1883

networks:
  app-network: